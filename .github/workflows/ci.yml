name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

# Cancel queued PR runs when a new push lands on the same PR ref. Don't cancel
# push-to-dev runs in flight — they may be the input to a release cut.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ExpertiseApi.slnx --disable-build-servers

      - name: SCA — vulnerable NuGet packages
        run: |
          dotnet list ExpertiseApi.slnx package --vulnerable --include-transitive | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::error::Vulnerable NuGet packages detected — see vuln-report.txt"
            exit 1
          fi

      - name: Build
        run: dotnet build ExpertiseApi.slnx --configuration Release --no-restore --disable-build-servers

      - name: Download ONNX model files
        run: bash scripts/download-models.sh

      - name: Test
        run: |
          dotnet test ExpertiseApi.slnx \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory test-results

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: test-results/*.trx
          retention-days: 14
