version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - nuget
    commit-message:
      prefix: chore
      include: scope
    groups:
      ef-core:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
          - "Npgsql.EntityFrameworkCore*"
          - "Pgvector.EntityFrameworkCore*"
      aspnet-core:
        patterns:
          - "Microsoft.AspNetCore.*"
      serilog:
        patterns:
          - "Serilog.*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore
      include: scope
