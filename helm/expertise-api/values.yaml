image:
  repository: ghcr.io/thesemicolon/agent-expertise-api
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

replicaCount: 1

service:
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  hostname: expertise.example.com
  clusterIssuer: letsencrypt-prod

auth:
  mode: apikey
  secretName: expertise-api-app

api:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

postgres:
  image: pgvector/pgvector:pg17
  storage: 1Gi
  secretName: expertise-postgres
  podCidr: "10.42.0.0/16"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

pgbouncer:
  image: edoburu/pgbouncer:v1.25.1-p0
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

metrics:
  enabled: false
  serviceMonitor:
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

backup:
  enabled: true
  schedule: "0 2 * * *"
  image: schickling/postgres-backup-s3:latest
  secretName: expertise-s3-backup
  retention: "7"
  s3:
    bucket: expertise-backup
    endpoint: ""
    forcePathStyle: false
