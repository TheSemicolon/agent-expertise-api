{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "expertise-api.fullname" . }}-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "expertise-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: {{ .Values.backup.image }}
              envFrom:
                - secretRef:
                    name: {{ .Values.backup.secretName }}
                - secretRef:
                    name: {{ .Values.postgres.secretName }}
              env:
                - name: POSTGRES_HOST
                  value: {{ include "expertise-api.fullname" . }}-postgres
                - name: POSTGRES_PORT
                  value: "5432"
                - name: POSTGRES_DATABASE
                  value: expertise
                - name: S3_BUCKET
                  value: {{ .Values.backup.s3.bucket }}
                - name: BACKUP_KEEP_DAYS
                  value: {{ .Values.backup.retention | quote }}
                {{- if .Values.backup.s3.endpoint }}
                - name: S3_ENDPOINT
                  value: {{ .Values.backup.s3.endpoint }}
                {{- end }}
                {{- if .Values.backup.s3.forcePathStyle }}
                - name: S3_S3V4
                  value: "yes"
                {{- end }}
{{- end }}
